- type: species
  id: Goblin
  name: species-name-goblin
  roundStart: true
  prototype: MobGoblin
  sprites: MobGoblinSprites
  markingLimits: MobGoblinMarkingLimits
  dollPrototype: MobGoblinDummy
  skinColoration: HumanToned #Possible values: TintedHues, Hues, HumanToned
