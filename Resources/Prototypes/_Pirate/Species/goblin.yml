- type: markingPoints
  id: MobGoblinMarkingLimits
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [ GoblinEarsBasic ]
    Snout:
      points: 2
      required: false
#      defaultMarkings: [ GoblinNoseBasic ]
    Underwear:
      points: 1
      required: false
