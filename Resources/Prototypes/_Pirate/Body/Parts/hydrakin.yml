- type: entity
  abstract: true
  parent: BasePart
  id: PartHydrakinBase
  name: "частина тіла гідракіна"
  components:
  - type: Sprite
    sprite: _Pirate/Mobs/Species/Hydrakin/parts.rsi
  - type: Icon
    sprite: _Pirate/Mobs/Species/Hydrakin/parts.rsi
  - type: BodyPart
    species: Hydrakin

- type: entity
  parent: [ PartHydrakinBase, BaseChest ]
  id: ChestHydrakin
  name: "hydrakin torso"
  components:
    - type: Sprite
      sprite: _Pirate/Mobs/Species/Hydrakin/parts.rsi
      state: "chest_m"
    - type: Icon
      sprite: _Pirate/Mobs/Species/Hydrakin/parts.rsi
      state: "chest_m"
    - type: Extractable
      juiceSolution:
        reagents:
        - ReagentId: Fat
          Quantity: 3
        - ReagentId: AmmoniaBlood
          Quantity: 10

- type: entity
  parent: [ PartHydrakinBase, BaseGroin ]
  id: GroinHydrakin
  name: "hydrakin groin"
