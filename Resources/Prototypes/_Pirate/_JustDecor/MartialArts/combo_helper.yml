- type: entity
  parent: BaseAction
  id: ActionCqcComboHelperToggle
  name: Перемкнути підказки комбо
  description: Показує або приховує підказки комбінацій бойових мистецтв.
  components:
  - type: Action
    useDelay: 1
    icon:
      sprite: _Goobstation/Objects/Misc/cqc_manual.rsi
      state: icon
    iconOn:
      sprite: _Goobstation/Objects/Misc/cqc_manual.rsi
      state: icon-alt
  - type: InstantAction
    event: !type:ComboHelperToggleEvent

- type: entity
  parent: BaseItem
  id: ComboHelperManual
  name: Посібник з комбо ближнього бою
  description: Компактний посібник для запам'ятовування нотації комбінацій бойових мистецтв.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/cqc_manual.rsi
    layers:
    - state: icon
  - type: Item
    size: Small
  - type: GrantComboHelper
