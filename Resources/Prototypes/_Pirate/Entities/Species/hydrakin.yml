- type: species
  id: Hydrakin
  name: species-name-hydrakin
  roundStart: true
  prototype: MobHydrakin
  sprites: MobHydrakinSprites
  markingLimits: MobHydrakinMarkingLimits
  dollPrototype: MobHydrakinDummy
  skinColoration: Hues
  defaultSkinTone: "#ffffff"
  maleFirstNames: NamesHydrakinUnisex
  femaleFirstNames: NamesHydrakinUnisex
  naming: First
  sexes:
  - Unsexed
  - Male
  - Female
  # begin Goobstation: port EE height/width sliders
  minHeight: 0.85
  defaultHeight: 0.90
  maxHeight: 1.15
  minWidth: 0.85
  defaultWidth: 0.90
  maxWidth: 1.10
  # end Goobstation: port EE height/width sliders

- type: markingPoints
  id: MobHydrakinMarkingLimits
  points:
    Hair:
      points: 0
      required: false
    FacialHair:
      points: 0
      required: false
    Snout:
      points: 0
      required: false
    HeadSide:
      points: 1
      required: false
    Head:
      points: 1
      required: true
      defaultMarkings: [ HydrakinEyesDefault]
    Tail:
      points: 1
      required: true
      defaultMarkings: [ HydrakinTailDefault ]
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [ HydrakinEarsDefault ]
    Chest:
      points: 4
      required: false
    Legs:
      points: 8 # imp 2<8
      required: false
    Arms:
      points: 8 # imp 2<8
      required: false
    Overlay:
      points: 2
      required: false

